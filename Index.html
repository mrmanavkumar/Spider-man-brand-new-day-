<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man: Brand New Day | Teaser</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <!-- Video background me invisible rahega, sirf sound play hoga -->
    <video loop id="bg-video" playsinline>
        <source src="rain-video.mp4" type="video/mp4">
    </video>

    <!-- Play Teaser Button Cover -->
    <div id="start-overlay" class="scene active">
        <button id="start-btn">PLAY TEASER</button>
    </div>

    <!-- Scene 1: Black Screen + Rain Sound + No Way Home Text -->
    <div id="scene-1" class="scene">
        <div class="text-group">
            <p class="fade-text line-a">The Last Known Record</p>
            <p class="fade-text highlight-date line-b">17 December 2021</p>
            <p class="fade-text title-sub line-c">Spider-Man: No Way Home</p>
        </div>
    </div>

    <!-- Scene 2: Story Continues (BGM starts) -->
    <div id="scene-2" class="scene">
        <div class="text-group-vertical">
            <p class="line-1">The world moved on...</p>
            <p class="line-2">But one story...</p>
            <p class="line-3">...was only beginning.</p>
        </div>
    </div>

    <!-- Scene 3: Timeline (Tick sound + Flash) -->
    <div id="scene-3" class="scene">
        <div id="timeline-year">2022</div>
        <div class="flash-overlay"></div>
    </div>

    <!-- Scene 4: Time Skip (Shake Effect) -->
    <div id="scene-4" class="scene">
        <div class="shake-container">
            <h1 class="thunder-text">5 Years Later...</h1>
        </div>
    </div>

    <!-- Scene 5 & 6: Brand New Day Logo Reveal -->
    <div id="scene-5-6" class="scene">
        <img src="logo.png" id="main-logo" class="glow-pulse" alt="Spider-Man: Brand New Day">
        
        <!-- Animated Web Lines for Scene 7 -->
        <div class="web-lines">
            <div class="web w1"></div>
            <div class="web w2"></div>
            <div class="web w3"></div>
            <div class="web w4"></div>
        </div>
    </div>

    <!-- Scene 8: Booking Process -->
    <div id="scene-8" class="scene">
        <div class="terminal">
            <div class="term-line" id="line-search"></div>
            <div class="term-line" id="line-seats"></div>
            <div class="term-line" id="line-pay"></div>
            <div class="term-line" id="line-confirm"></div>
        </div>
    </div>

    <!-- Scene 9: Final Booking Reveal -->
    <div id="scene-9" class="scene">
        <h1 class="ticket-heading">🎟️ ADVANCE TICKETS BOOKED</h1>
        <p class="ticket-sub">First Day • First Show</p>
    </div>

    <!-- Scene 10: Ending -->
    <div id="scene-10" class="scene">
        <h2 class="see-you-text">See You In Theaters.</h2>
    </div>

    <!-- Audio Clips -->
    <audio id="audio-bgm" src="bgm.mp3"></audio>
    <audio id="audio-web" src="web.mp3"></audio>
    <audio id="audio-tick" src="tick.mp3"></audio>

    <script src="Script.js"></script>
</body>
</html>
